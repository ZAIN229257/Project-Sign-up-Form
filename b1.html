<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project: Sign-up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="min">
      <div class="contenr1">
        <div class="bacgrond-lego">
          <img src="1.jpg/odin-lined.png" alt="odin" />
          <span class="logo-name">ODiN</span>
        </div>
        <p class="name">
          Photo by
          <a href="https://unsplash.com/@abrizgalov">Artem Bryzgalov</a> on
          <a href="https://unsplash.com/">Unsplash</a>
        </p>
      </div>
      
      <div class="contenr2">
        <div class="sac1">
          <div class="sac1p">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. Sign up
            now to get started.
          </p>
          <p>You know you want to.</p>
        </div>
        </div>
        <div class="Form">
         <h3> Let's do this!</h3>
         <form id="min-form" >
          <div class="fields-container">
          <div>
            <label for="fname">First name : </label>
            <input id="fname" name="fname" type="text" required />
            
          </div>
          <div>
            <label for="lname">Last name : </label>
            <input id="lname" name="lname" type="text" required />  
          </div>
          <div>
            <label for="Email"> Email: </label>
            <input id="Email" name="Email" type="email" required />
          </div>
           <div>
            <label for="phone-number">Phone Number: </label>
            <input id="phone-number" name="phone-number" type="tel" required />
            
          </div>
          <div>
            <label for="password">password: </label>
            <input id="password" name="password" type="password" required />  
          </div>
          <div>
            <label for="Confirm-password"> Confirm Password: </label>
            <input id="Confirm-password" name="Confirm-password" type="password" required />
          </div>
          </div>
         </form>
        </div>

        <div class="sac3">
          <button type="submit" form="min-form">Create Account</button>
          <p>
            Already have an acccount? <a
              href="https://www.theodinproject.com/lessons/node-path-intermediate-html-and-css-sign-up-form"
              >log in</a
            >
          </div>
          </p>
        </div>
      
    </div>
  </body>
</html>
